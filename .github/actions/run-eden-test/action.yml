name: 'Run specified Eden test workflow'
description: 'Setup Eden run specified test from workflow and publish logs'

inputs:
  file_system:
    required: true
    type: string
  tpm_enabled:
    required: true
    type: bool
  suite:
    required: true
    type: string
  eve_image:
    type: string
  eve_log_level:
    type: string
    required: false
    default: 'info'
  eve_artifact_name:
    type: string
  artifact_run_id:
    type: string
  require_virtualization:
    type: bool


runs:
  using: 'composite'
  steps:
    - name: Collect Workflow Telemetry
      uses: catchpoint/workflow-telemetry-action@v2
      with:
        proc_trace_sys_enable: true
        comment_on_pr: false
    - name: Setup Environment
      uses: ./eden/.github/actions/setup-environment
      with:
        file_system: ${{ inputs.file_system }}
        tpm_enabled: ${{ inputs.tpm_enabled }}
        eve_image: ${{ inputs.eve_image }}
        eve_log_level: ${{ inputs.eve_log_level }}
        eve_artifact_name: ${{ inputs.eve_artifact_name }}
        artifact_run_id: ${{ inputs.artifact_run_id }}
        require_virtualization: ${{ inputs.require_virtualization }}
    - name: Run tests
      run: EDEN_TEST_STOP=n ./eden test ./tests/workflow -s ${{ inputs.suite }} -v debug
      shell: bash
      working-directory: "./eden"
    - name: Collect coverage
      if: always()
      run: |
        mkdir -p eden_coverage
        ./eden eve collect-coverage --output-dir ./eden_coverage || true
        ls -la eden_coverage/ || true
      shell: bash
      working-directory: "./eden"
    - name: Upload coverage artifact
      if: always() && hashFiles('./eden/eden_coverage/eden_e2e_coverage.txt') != ''
      uses: actions/upload-artifact@v4
      with:
        name: covdata-${{ inputs.suite }}-fs-${{ inputs.file_system }}-tpm-${{ inputs.tpm_enabled }}-attempt-${{ github.run_attempt }}
        path: ./eden/eden_coverage/
        if-no-files-found: warn
        retention-days: 7
    - name: Collect info
      if: failure()
      uses: ./eden/.github/actions/collect-info
    - name: Collect logs
      if: always()
      uses: ./eden/.github/actions/publish-logs
      with:
        report_name: eden-report-${{ inputs.suite }}-tpm-${{ inputs.tpm_enabled }}-${{ inputs.file_system }}
    - name: Clean up after test
      if: always()
      run: |
        ./eden stop || true
        make clean >/dev/null || true
        docker system prune -f -a >/dev/null || true
      shell: bash
      working-directory: "./eden"
